suite: helm_lib_csi_node_value definition
templates:
  - helm_lib_csi_node_value.yaml
tests:
  - it: renders initContainer when data provided

    set:
      global:
        modules:
          placement: {}
        modulesImages:
          registry:
            base: "deckhouse.io/deckhouse/ce"
          digests:
            common:
              csiNodeDriverRegistrar125: csiNodeDriverRegistrar125
        discovery:
          kubernetesVersion: "1.25"
      _testvalues:
        forceCsiNodeAndStaticNodesDepoloy: true
        nodeImage: nodeImage
        driverFQDN: driverFQDN
        additionalNodeEnvs:
          - name: testEnv
            value: testValue
        additionalNodeArgs:
          - --start
        additionalNodeVolumes: {}
        additionalNodeVolumeMounts: {}
        initContainers:
          - name: init-container-name
            command:
              - command
            imagePullPolicy: IfNotPresent
            image: initContainerImage

    asserts:
      - containsDocument:
          kind: DaemonSet
          apiVersion: apps/v1
          name: csi-node
          namespace: d8-test-module

      - equal:
          path: "spec.template.spec.initContainers[0].image"
          value: initContainerImage

      - equal:
          path: "spec.template.spec.initContainers[0].command"
          value:
            - command

      - equal:
          path: "spec.template.spec.initContainers[0].name"
          value: init-container-name

  - it: contains params according values

    set:
      global:
        modules:
          placement: {}
        modulesImages:
          registry:
            base: "deckhouse.io/deckhouse/ce"
          digests:
            common:
              csiNodeDriverRegistrar125: csiNodeDriverRegistrar125
        discovery:
          kubernetesVersion: "1.25"
      _testvalues:
        forceCsiNodeAndStaticNodesDepoloy: true
        nodeImage: nodeImage
        driverFQDN: driverFQDN
        additionalNodeEnvs:
          - name: testEnv
            value: testValue
        additionalNodeArgs:
          - --start
        additionalNodeVolumes: {}
        additionalNodeVolumeMounts: {}
        initContainers:
          - name: init-container-name
            command:
              - command
            imagePullPolicy: IfNotPresent
            image: initContainerImage

    asserts:
      - equal:
          path: "spec.template.spec.initContainers[0].image"
          value: initContainerImage

      - equal:
          path: "spec.template.spec.initContainers[0].command"
          value:
            - command

      - equal:
          path: "spec.template.spec.initContainers[0].name"
          value: init-container-name

  - it: node container sets allowPrivilegeEscalation and drops all capabilities by default
    set:
      global:
        modules:
          placement: {}
        modulesImages:
          registry:
            base: "deckhouse.io/deckhouse/ce"
          digests:
            common:
              csiNodeDriverRegistrar125: csiNodeDriverRegistrar125
        discovery:
          kubernetesVersion: "1.25"
      _testvalues:
        forceCsiNodeAndStaticNodesDepoloy: true
        nodeImage: nodeImage
        driverFQDN: driverFQDN
        additionalNodeVolumes: {}
        additionalNodeVolumeMounts: {}
    documentSelector:
      path: kind
      value: DaemonSet
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: node
      - equal:
          path: spec.template.spec.containers[1].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true
      - equal:
          path: spec.template.spec.containers[1].securityContext.capabilities.drop
          value:
            - ALL
      - notExists:
          path: spec.template.spec.containers[1].securityContext.capabilities.add

  - it: node container adds SYS_ADMIN capability when setSysAdminCapability is true
    set:
      global:
        modules:
          placement: {}
        modulesImages:
          registry:
            base: "deckhouse.io/deckhouse/ce"
          digests:
            common:
              csiNodeDriverRegistrar125: csiNodeDriverRegistrar125
        discovery:
          kubernetesVersion: "1.25"
      _testvalues:
        forceCsiNodeAndStaticNodesDepoloy: true
        nodeImage: nodeImage
        driverFQDN: driverFQDN
        setSysAdminCapability: true
        additionalNodeVolumes: {}
        additionalNodeVolumeMounts: {}
    documentSelector:
      path: kind
      value: DaemonSet
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: node
      - equal:
          path: spec.template.spec.containers[1].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[1].securityContext.capabilities.drop
          value:
            - ALL
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: SYS_ADMIN
