suite: helm_lib_module_gateway definition
templates:
  - helm_lib_module_gateway.yaml
tests:
  - it: should return an empty result if default gateway isn't discovered
    set:
      global:
        modules: {}
        discovery:
          gatewayAPIDefaultGateway:
            name: ""
            namespace: ""
    asserts:
      - isEmpty:
          path: "result"

  - it: should return a default gateway from the discovery section
    set:
      global:
        modules: {}
        discovery:
          gatewayAPIDefaultGateway:
            name: "d8"
            namespace: "d8-alb-istio"
    asserts:
      - equal:
          path: "result"
          value:
            name: "d8"
            namespace: "d8-alb-istio"

  - it: should return a gateway from the global modules config
    set:
      global:
        modules: 
          gatewayAPIGateway:
            name: "shared-gateway"
            namespace: "d8-shared-gateway"
        discovery:
          gatewayAPIDefaultGateway:
            name: "d8"
            namespace: "d8-alb-istio"
    asserts:
      - equal:
          path: "result"
          value:
            name: "shared-gateway"
            namespace: "d8-shared-gateway"

  - it: should return a gateway from the module config
    set:
      testModule:
        gatewayAPIGateway:
          name: "local-gateway"
          namespace: "local-gateway"
      global:
        modules: 
          gatewayAPIGateway:
            name: "shared-gateway"
            namespace: "d8-shared-gateway"
        discovery:
          gatewayAPIDefaultGateway:
            name: "d8"
            namespace: "d8-alb-istio"
    asserts:
      - equal:
          path: "result"
          value:
            name: "local-gateway"
            namespace: "local-gateway"
